name: phase0-security-check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run security guardrail check
        run: bash scripts/security_guardrail_check.sh
