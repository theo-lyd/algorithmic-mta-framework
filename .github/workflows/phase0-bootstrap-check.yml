name: phase0-bootstrap-check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bootstrap-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run CI bootstrap
        run: bash scripts/bootstrap_ci.sh
