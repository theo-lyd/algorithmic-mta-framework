name: phase5-pr-checks

on:
  pull_request:
    branches: [master]

jobs:
  governance-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run transformations and data tests
        run: |
          PYTHONPATH=. python -m unittest discover -s tests/phase5 -p 'test_*.py'
          PYTHONPATH=. python ingestion/pipeline/validate_business_rules_phase5.py
          PYTHONPATH=. python ingestion/pipeline/validate_reliability_monitors.py

      - name: Upload phase 5 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase5-pr-artifacts
          path: artifacts/phase-5
